<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qchat | Güvenli İletişim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --q-green: #25d366; --q-dark-green: #075e54; --q-bg: #f0f2f5; --q-white: #ffffff; }
        body { background-color: var(--q-bg); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        .chat-bubble-me { background-color: #dcf8c6; border-radius: 12px 0px 12px 12px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .chat-bubble-them { background-color: var(--q-white); border-radius: 0px 12px 12px 12px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .auth-card { box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="auth-screen" class="h-full flex flex-col items-center justify-center p-6 bg-gradient-to-b from-[#25d366] to-[#075e54]">
        <div class="auth-card bg-white w-full max-w-md rounded-3xl p-8 flex flex-col items-center text-center">
            <div class="bg-[#25d366] p-4 rounded-2xl mb-4"><i data-lucide="message-circle" class="w-10 h-10 text-white"></i></div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Qchat'e Hoş Geldin</h1>
            <p class="text-sm text-gray-500 mb-8">Uçtan uca şifreli, sunucusuz ve özgür mesajlaşma deneyimi.</p>
            
            <!-- GOOGLE GİRİŞ BUTONU -->
            <button id="google-login-btn" class="w-full bg-white border border-gray-300 text-gray-700 font-bold py-3 px-4 rounded-xl hover:bg-gray-50 transition-colors flex items-center justify-center gap-3">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google">
                Google ile Giriş Yap
            </button>
        </div>
        <p class="text-white/70 text-[10px] mt-8 uppercase tracking-widest font-bold">Military Grade Encryption Active</p>
    </div>

    <!-- ANA EKRAN -->
    <div id="main-screen" class="h-full flex flex-col hidden bg-white">
        <header class="p-4 bg-white flex justify-between items-center border-b border-gray-100">
            <div class="flex items-center gap-4">
                <div class="flex flex-col">
                    <span class="text-[9px] text-blue-500 font-bold uppercase">Kişisel Kimliğin</span>
                    <button onclick="copyID()" class="flex items-center gap-2 text-gray-800 font-bold hover:text-blue-600 transition-colors">
                        <span id="display-id">Yükleniyor...</span>
                        <i data-lucide="copy" class="w-3 h-3 text-blue-400"></i>
                    </button>
                </div>
            </div>
            <button id="logout-btn" class="text-red-500 font-bold text-xs">Çıkış Yap</button>
        </header>

        <div class="px-4 py-2 bg-white">
            <div class="relative">
                <input type="text" id="user-search" placeholder="Ağdaki diğer kişileri ara..." class="w-full bg-gray-100 rounded-full py-2.5 pl-10 pr-4 text-sm focus:ring-1 ring-green-500 outline-none transition-all">
                <i data-lucide="search" class="absolute left-3.5 top-2.5 text-gray-400 w-4 h-4"></i>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto" id="chat-list">
            <div class="p-6 text-center text-sm text-gray-400">
                <div class="w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>
                Ağ taranıyor...
            </div>
        </div>
    </div>

    <!-- SOHBET EKRANI -->
    <div id="chat-screen" class="fixed inset-0 bg-white z-50 hidden flex flex-col">
        <header class="p-4 flex justify-between items-center border-b border-gray-100">
            <div class="flex items-center gap-3">
                <button onclick="closeChat()"><i data-lucide="chevron-left" class="text-green-500"></i></button>
                <img id="active-avatar" src="" class="w-10 h-10 rounded-full bg-green-50 object-cover">
                <div>
                    <h2 id="active-name" class="font-bold text-sm leading-tight">Hedef</h2>
                    <span class="text-[10px] text-green-500 font-bold uppercase">Uçtan Uca Şifreli</span>
                </div>
            </div>
            <div class="flex items-center gap-5">
                <button onclick="startCall('Sesli')" class="text-gray-500 hover:text-green-500"><i data-lucide="phone" class="w-5 h-5"></i></button>
                <button onclick="startCall('Görüntülü')" class="text-gray-500 hover:text-green-500"><i data-lucide="video" class="w-5 h-5"></i></button>
            </div>
        </header>

        <div id="message-flow" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 bg-[#e5ddd5]" style="background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: #f0f2f5;">
        </div>

        <footer class="p-3 bg-white flex items-center gap-3">
            <div class="flex-1">
                <input type="text" id="chat-input" placeholder="Bir mesaj yazın..." class="w-full bg-gray-100 rounded-full py-2.5 px-5 text-sm outline-none">
            </div>
            <div class="flex items-center gap-4">
                <label class="cursor-pointer">
                    <input type="file" class="hidden" accept="image/*" onchange="handleFile(event)">
                    <i data-lucide="image" class="w-6 h-6 text-gray-400 hover:text-green-500"></i>
                </label>
                <button id="mic-btn" class="p-2 text-gray-400 hover:text-green-500 transition-transform">
                    <i data-lucide="mic" class="w-6 h-6"></i>
                </button>
            </div>
        </footer>
    </div>

    <!-- ARAMA EKRANI -->
    <div id="call-overlay" class="fixed inset-0 bg-[#075e54] z-[100] hidden flex flex-col items-center justify-center text-white">
        <video id="remote-video" class="absolute inset-0 w-full h-full object-cover hidden" autoplay playsinline></video>
        <video id="local-video" class="absolute bottom-4 right-4 w-24 h-32 bg-black rounded-xl hidden shadow-lg" autoplay playsinline muted></video>

        <div id="call-ui" class="z-10 flex flex-col items-center">
            <div class="w-24 h-24 rounded-full bg-white/20 mb-6 flex items-center justify-center animate-pulse">
                <i data-lucide="user" class="w-12 h-12"></i>
            </div>
            <h2 id="call-target" class="text-2xl font-bold mb-2">Bilinmeyen</h2>
            <p id="call-status" class="text-white/70 mb-20 uppercase tracking-widest text-[10px] font-bold">Uçtan Uca Şifreli Arama</p>
            
            <div class="flex gap-8">
                <button id="accept-call-btn" class="bg-green-500 p-6 rounded-full shadow-lg hidden">
                    <i data-lucide="phone" class="text-white w-8 h-8"></i>
                </button>
                <button onclick="endCall()" class="bg-red-500 p-6 rounded-full shadow-lg">
                    <i data-lucide="phone-off" class="text-white w-8 h-8"></i>
                </button>
            </div>
        </div>
    </div>
    <audio id="remote-audio" autoplay hidden></audio>

    <script type="module">
        lucide.createIcons();

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEKBdUdwHHs2NEnqQ8igyi6oPE5nxg7Fo",
            authDomain: "qchat-76926.firebaseapp.com",
            databaseURL: "https://qchat-76926-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "qchat-76926",
            storageBucket: "qchat-76926.firebasestorage.app",
            messagingSenderId: "948993735337",
            appId: "1:948993735337:web:99c8ceb48a39fde35ec7b8",
            measurementId: "G-1VKMX2YKF0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const googleProvider = new GoogleAuthProvider();

        let currentUser = null;
        let currentPhoto = null;
        let myId = null;
        let activeChat = null;
        let activeChatId = null;
        let peer = null;
        let currentCall = null;
        let localStream = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginUserToSystem(user);
            } else {
                document.getElementById('main-screen').classList.add('hidden');
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        document.getElementById('google-login-btn').addEventListener('click', () => {
            const btn = document.getElementById('google-login-btn');
            btn.innerHTML = '<div class="w-6 h-6 border-2 border-gray-500 border-t-transparent rounded-full animate-spin"></div> Bağlanıyor...';
            
            signInWithPopup(auth, googleProvider).catch((error) => {
                alert("Giriş yapılamadı: " + error.message);
                btn.innerHTML = '<img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google"> Google ile Giriş Yap';
            });
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.reload(); });
        });

        function loginUserToSystem(user) {
            currentUser = user.displayName;
            currentPhoto = user.photoURL;
            myId = `Q-${user.uid.substring(0,6).toUpperCase()}`;

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('display-id').innerText = myId;

            set(ref(db, 'users/' + myId), {
                username: currentUser,
                photo: currentPhoto,
                id: myId,
                lastSeen: Date.now()
            }).catch(err => alert("Veritabanı erişim hatası! Lütfen Firebase kurallarından Okuma/Yazmayı açtığınıza emin olun."));

            loadUsers();
            initWebRTC();
        }

        function loadUsers() {
            const chatList = document.getElementById('chat-list');
            onValue(ref(db, 'users'), (snapshot) => {
                chatList.innerHTML = ''; 
                if(!snapshot.exists()) {
                    chatList.innerHTML = '<p class="text-center text-gray-400 mt-4">Ağda henüz kimse yok.</p>';
                    return;
                }

                snapshot.forEach((child) => {
                    const user = child.val();
                    if(user.id !== myId) {
                        const div = document.createElement('div');
                        div.className = "flex items-center gap-4 px-4 py-3 hover:bg-gray-50 cursor-pointer border-b border-gray-50";
                        div.onclick = () => window.openChat(user);
                        div.innerHTML = `
                            <div class="relative">
                                <img src="${user.photo}" class="w-14 h-14 rounded-full bg-green-50 object-cover">
                                <div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-500 border-2 border-white rounded-full"></div>
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between items-center mb-0.5">
                                    <h3 class="font-bold text-gray-800">${user.username}</h3>
                                </div>
                                <p class="text-xs text-gray-500">${user.id}</p>
                            </div>
                        `;
                        chatList.appendChild(div);
                    }
                });
            });
        }

        window.openChat = (targetUser) => {
            activeChat = targetUser;
            activeChatId =[myId, targetUser.id].sort().join('_'); 

            document.getElementById('active-name').innerText = targetUser.username;
            document.getElementById('active-avatar').src = targetUser.photo;
            document.getElementById('chat-screen').classList.remove('hidden');
            
            const flow = document.getElementById('message-flow');
            flow.innerHTML = '';

            const chatRef = ref(db, 'messages/' + activeChatId);
            onChildAdded(chatRef, (snapshot) => {
                const msg = snapshot.val();
                appendMessage(msg.text, msg.sender === myId ? "me" : "them", msg.type);
            });
        };

        window.closeChat = () => {
            document.getElementById('chat-screen').classList.add('hidden');
            activeChatId = null;
        };

        function sendMessage(text, type = "text") {
            if(!activeChatId || text.trim() === "") return;
            push(ref(db, 'messages/' + activeChatId), {
                sender: myId,
                text: text,
                type: type,
                timestamp: Date.now()
            });
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                sendMessage(e.target.value, "text");
                e.target.value = "";
            }
        });

        function appendMessage(text, senderType, msgType) {
            const flow = document.getElementById('message-flow');
            const div = document.createElement('div');
            div.className = `flex ${senderType === 'me' ? 'justify-end' : 'justify-start'} w-full`;
            
            const inner = document.createElement('div');
            inner.className = `p-3 max-w-[80%] ${senderType === 'me' ? 'chat-bubble-me' : 'chat-bubble-them'}`;
            
            if(msgType === 'image') {
                inner.innerHTML = `<img src="${text}" class="rounded-lg max-w-full">`;
            } else if(msgType === 'audio') {
                inner.innerHTML = `<audio controls src="${text}" class="w-48"></audio>`;
            } else {
                inner.innerHTML = `<p class="text-sm text-gray-800">${text}</p><p class="text-[9px] text-right text-gray-400 mt-1">✓✓</p>`;
            }

            div.appendChild(inner);
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        window.handleFile = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => sendMessage(ev.target.result, "image");
                reader.readAsDataURL(file);
            }
        };

        const mic = document.getElementById('mic-btn');
        let mediaRecorder;
        let audioChunks =[];

        mic.addEventListener('mousedown', async () => { 
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start();
                mic.classList.add('text-red-500', 'scale-125');
                window.actionToast("Ses kaydediliyor... Bırakınca gönderilir.");

                mediaRecorder.addEventListener("dataavailable", event => { audioChunks.push(event.data); });

                mediaRecorder.addEventListener("stop", () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = (ev) => sendMessage(ev.target.result, "audio");
                    reader.readAsDataURL(audioBlob);
                    audioChunks =[];
                });
            } catch (err) { alert("Mikrofon izni reddedildi."); }
        });

        window.addEventListener('mouseup', () => { 
            if(mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                mic.classList.remove('text-red-500', 'scale-125');
            }
        });

        function initWebRTC() {
            peer = new Peer(myId); 
            
            peer.on('call', (call) => {
                document.getElementById('call-overlay').classList.remove('hidden');
                document.getElementById('call-target').innerText = call.peer;
                document.getElementById('call-status').innerText = "GELEN ARAMA...";
                
                const acceptBtn = document.getElementById('accept-call-btn');
                acceptBtn.classList.remove('hidden');

                acceptBtn.onclick = async () => {
                    acceptBtn.classList.add('hidden');
                    document.getElementById('call-status').innerText = "BAĞLANDI";
                    
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    call.answer(localStream);
                    currentCall = call;

                    call.on('stream', (remoteStream) => playStream(remoteStream));
                };
            });
        }

        window.startCall = async (type) => {
            document.getElementById('call-target').innerText = activeChat.username;
            document.getElementById('call-status').innerText = `${type.toUpperCase()} ARANIYOR...`;
            document.getElementById('call-overlay').classList.remove('hidden');
            document.getElementById('accept-call-btn').classList.add('hidden');

            const isVideo = type === 'Görüntülü';
            localStream = await navigator.mediaDevices.getUserMedia({ video: isVideo, audio: true });
            
            if(isVideo) {
                const localVid = document.getElementById('local-video');
                localVid.srcObject = localStream;
                localVid.classList.remove('hidden');
            }

            currentCall = peer.call(activeChat.id, localStream);
            
            currentCall.on('stream', (remoteStream) => {
                document.getElementById('call-status').innerText = "BAĞLANDI";
                playStream(remoteStream, isVideo);
            });
        };

        function playStream(stream, isVideo = true) {
            if(isVideo) {
                const remoteVid = document.getElementById('remote-video');
                remoteVid.srcObject = stream;
                remoteVid.classList.remove('hidden');
            } else {
                const remoteAud = document.getElementById('remote-audio');
                remoteAud.srcObject = stream;
            }
        }

        window.endCall = () => {
            if(currentCall) currentCall.close();
            if(localStream) localStream.getTracks().forEach(track => track.stop());
            
            document.getElementById('call-overlay').classList.add('hidden');
            document.getElementById('remote-video').classList.add('hidden');
            document.getElementById('local-video').classList.add('hidden');
            document.getElementById('remote-video').srcObject = null;
            document.getElementById('remote-audio').srcObject = null;
        };

        window.copyID = () => {
            navigator.clipboard.writeText(myId).then(() => window.actionToast("Kimlik Kopyalandı!"));
        };

        window.actionToast = (msg) => {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-2 rounded-full text-xs font-bold z-[200] animate-bounce";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        };
    </script>
</body>
</html>
